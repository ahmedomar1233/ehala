<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Doctor Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f0f4f8;
  --surface:   #ffffff;
  --card-bg:   #ffffff;
  --border:    #dde3ec;
  --accent:    #1d6fdb;
  --accent-lt: #e8f0fc;
  --green:     #16a37f;
  --green-lt:  #e6f7f3;
  --text:      #111827;
  --sub:       #6b7280;
  --muted:     #9ca3af;
  --danger:    #dc2626;
  --radius:    16px;
  --shadow:    0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 80px;
}

/* ── Top bar ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-brand .icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-brand .icon svg { width: 18px; height: 18px; }
.topbar-brand span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--sub);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .4s;
  flex-shrink: 0;
}
.live-dot.on  { background: var(--green); box-shadow: 0 0 0 2px var(--green-lt); }
.live-dot.err { background: var(--danger); }

/* ── Page wrapper ── */
.page {
  max-width: 680px;
  margin: 0 auto;
  padding: 36px 16px 0;
}

/* ── Input card ── */
.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 28px 24px;
  margin-bottom: 28px;
}
.input-card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 20px;
  letter-spacing: -0.2px;
}

.fields-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
@media (max-width: 480px) {
  .fields-row { grid-template-columns: 1fr; }
}

.field label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sub);
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.92rem;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.field input:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(29,111,219,.12);
}
.field input::placeholder { color: var(--muted); }

.btn-row { display: flex; gap: 10px; align-items: center; }
.btn-add {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 11px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: background .15s, transform .1s, box-shadow .15s;
  box-shadow: 0 2px 8px rgba(29,111,219,.25);
}
.btn-add:hover { background: #1660c4; box-shadow: 0 4px 14px rgba(29,111,219,.35); }
.btn-add:active { transform: scale(.97); }
.btn-add svg { width: 16px; height: 16px; }

.btn-clear {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--sub);
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.btn-clear:hover { color: var(--danger); border-color: var(--danger); }

/* ── List header ── */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding: 0 4px;
}
.list-header h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--sub);
}
.count-pill {
  background: var(--accent-lt);
  color: var(--accent);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 0.75rem;
  font-weight: 600;
}

/* ── Doctor cards ── */
#cards-list { display: flex; flex-direction: column; gap: 10px; }

.doc-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow);
  animation: slideIn .2s ease both;
  transition: border-color .2s, box-shadow .2s;
}
.doc-card:hover { border-color: #c4cfe0; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
.doc-card.flash {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-lt);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent-lt);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.card-body { flex: 1; min-width: 0; }
.card-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-dept {
  font-size: 0.8rem;
  color: var(--sub);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.dept-tag {
  background: var(--green-lt);
  color: var(--green);
  border-radius: 6px;
  padding: 1px 8px;
  font-size: 0.75rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.card-del {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s, background .15s;
  flex-shrink: 0;
}
.card-del:hover { color: var(--danger); background: #fef2f2; }
.card-del svg { width: 15px; height: 15px; }

/* ── Empty state ── */
#empty {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
  display: none;
}
#empty.show { display: block; }
#empty svg { opacity: .35; margin-bottom: 12px; }
#empty p { font-size: 0.88rem; }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #1f2937;
  color: #f9fafb;
  padding: 10px 22px;
  border-radius: 10px;
  font-size: 0.84rem;
  font-weight: 500;
  opacity: 0;
  transition: transform .3s ease, opacity .3s;
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="icon">
      <svg fill="none" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="6" r="3" fill="#fff"/>
        <path d="M3 15c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="9" y1="10.5" x2="9" y2="13.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="7.5" y1="12" x2="10.5" y2="12" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <span>Doctor Registry</span>
  </div>
  <div class="live-badge">
    <div class="live-dot" id="dot"></div>
    <span id="live-text">Connecting…</span>
  </div>
</div>

<!-- Page -->
<div class="page">

  <!-- Input card -->
  <div class="input-card">
    <div class="input-card-title">Add a Doctor</div>
    <div class="fields-row">
      <div class="field">
        <label>Doctor Name</label>
        <input type="text" id="inp-name" placeholder="e.g. Dr. Al-Harbi" maxlength="80" />
      </div>
      <div class="field">
        <label>Department</label>
        <input type="text" id="inp-dept" placeholder="e.g. Cardiology" maxlength="80" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-add" onclick="addDoctor()">
        <svg fill="none" viewBox="0 0 16 16"><line x1="8" y1="2" x2="8" y2="14" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="8" x2="14" y2="8" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        Add Doctor
      </button>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <!-- List -->
  <div class="list-header">
    <h2>Registered Doctors</h2>
    <span class="count-pill" id="count">0</span>
  </div>

  <div id="cards-list"></div>

  <div id="empty">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
      <rect x="8" y="14" width="36" height="30" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <line x1="16" y1="24" x2="36" y2="24" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="31" x2="28" y2="31" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
      <circle cx="26" cy="12" r="5" stroke="#9ca3af" stroke-width="2"/>
    </svg>
    <p>No doctors yet — add the first one above.</p>
  </div>

</div><!-- /page -->

<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue,
         push, remove, get }          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── Config ─────────────────────────────────────────── */
const firebaseConfig = {
  databaseURL: "https://ryd-ehala-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const doctorsRef = ref(db, 'doctors');

/* ── Status helpers ─────────────────────────────────── */
const dot      = document.getElementById('dot');
const liveText = document.getElementById('live-text');

function setLive()  { dot.className = 'live-dot on';  liveText.textContent = 'Live'; }
function setError() { dot.className = 'live-dot err'; liveText.textContent = 'Connection error'; }
function setWait()  { dot.className = 'live-dot';     liveText.textContent = 'Connecting…'; }

/* ── Toast ──────────────────────────────────────────── */
function toast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

/* ── Render ─────────────────────────────────────────── */
function initials(name) {
  return name.replace(/^dr\.?\s*/i,'').trim().split(/\s+/).slice(0,2)
    .map(w => w[0]?.toUpperCase() || '').join('') || '?';
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(data) {
  const list  = document.getElementById('cards-list');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');

  if (!data) {
    list.innerHTML = '';
    empty.classList.add('show');
    count.textContent = '0';
    return;
  }

  const entries = Object.entries(data).reverse(); // newest first
  count.textContent = entries.length;
  empty.classList.remove('show');
  list.innerHTML = '';

  entries.forEach(([key, doc]) => {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.dataset.key = key;

    card.innerHTML = `
      <div class="card-avatar">${esc(initials(doc.name))}</div>
      <div class="card-body">
        <div class="card-name">${esc(doc.name)}</div>
        <div class="card-dept"><span class="dept-tag">${esc(doc.dept)}</span></div>
      </div>
      <button class="card-del" data-key="${key}" title="Remove">
        <svg fill="none" viewBox="0 0 15 15"><path d="M3 3l9 9M12 3l-9 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    `;
    list.appendChild(card);
  });

  // Delete buttons
  list.querySelectorAll('.card-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      remove(ref(db, 'doctors/' + key));
      toast('Entry removed.');
    });
  });
}

/* ── Real-time listener ─────────────────────────────── */
onValue(doctorsRef,
  snap  => { setLive(); render(snap.val()); },
  error => { setError(); console.error(error); }
);

/* ── Add ────────────────────────────────────────────── */
window.addDoctor = async function () {
  const nameEl = document.getElementById('inp-name');
  const deptEl = document.getElementById('inp-dept');
  const name   = nameEl.value.trim();
  const dept   = deptEl.value.trim();

  if (!name && !dept) { toast('⚠ Fill in at least one field.'); return; }

  try {
    await push(doctorsRef, {
      name: name || '—',
      dept: dept || '—',
      ts:   Date.now()
    });
    nameEl.value = '';
    deptEl.value = '';
    nameEl.focus();
    toast('✓ Doctor added.');
  } catch (e) {
    toast('Error: ' + e.message);
    setError();
  }
};

/* ── Clear all ──────────────────────────────────────── */
window.clearAll = async function () {
  const snap = await get(doctorsRef);
  if (!snap.exists()) { toast('Nothing to clear.'); return; }
  const n = Object.keys(snap.val()).length;
  if (!confirm(`Remove all ${n} entries? This affects everyone.`)) return;
  await remove(doctorsRef);
  toast('All entries cleared.');
};

/* ── Enter key ──────────────────────────────────────── */
['inp-name','inp-dept'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') window.addDoctor();
  });
});

setWait();
</script>
</body>
</html>
